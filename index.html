<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>แหล่งอ้างอิง</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: "Kanit", sans-serif;
    background: linear-gradient(135deg, #66ACA5, #99C7C3);
    margin:0;
    min-height:100vh;
}

.container{
    max-width:500px;
    margin:auto;
    text-align:center;
    padding:80px 20px;
}

h1{
    font-weight:600;
    font-size:36px;
    margin-bottom:10px;
    color:white;
}

p{
    color:#e8f5f4;
    margin-bottom:40px;
}

.link{
    display:block;
    width:70%;
    margin:18px auto;
    text-decoration:none;
    padding:14px;
    border-radius:999px;
    color:white;
    font-size:17px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);

    transition:0.25s;
}

.link:hover{
    background: rgba(255,255,255,0.25);
    transform:scale(1.04);
}

</style>

</head>

<body>

<div class="container">

<h1>แหล่งอ้างอิง</h1>
<p>บทความที่ใช้ประกอบงานนี้</p>

<a class="link" href="https://link1.com" target="_blank">บทความที่ 1</a>
<a class="link" href="https://link2.com" target="_blank">บทความที่ 2</a>
<a class="link" href="https://link3.com" target="_blank">บทความที่ 3</a>

</div>

</body>
</html>
